<!-- Representative WebK chat DOM for extraction tests.
     Structure mirrors selectors.py; refreshed from a real session during e2e. -->
<div id="page-chats" class="whole page-chats">
  <div class="bubbles">
    <div class="bubbles-inner">

      <div class="bubble service" data-mid="100">
        <div class="message">July 13</div>
      </div>

      <div class="bubble" data-mid="101">
        <div class="message">
          fixture bot ready. Press a button:
          <span class="time" title="19:01">19:01</span>
        </div>
        <div class="reply-markup">
          <div class="reply-markup-row">
            <button class="reply-markup-button"><span>A1</span></button>
            <button class="reply-markup-button"><span>A2</span></button>
          </div>
          <div class="reply-markup-row">
            <button class="reply-markup-button"><span>B1</span></button>
            <button class="reply-markup-button"><span>B2</span></button>
          </div>
        </div>
      </div>

      <div class="bubble is-out" data-mid="102">
        <div class="message">
          hello bot
          <span class="time" title="19:02">19:02</span>
        </div>
      </div>

      <div class="bubble" data-mid="103">
        <div class="attachment media-container">
          <img class="media-photo" src="" alt="">
        </div>
        <div class="message">
          a tiny photo
          <span class="time" title="19:03">19:03</span>
        </div>
      </div>

    </div>
  </div>
</div>
